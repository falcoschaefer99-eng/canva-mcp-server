name = "canva-mcp-server"
main = "src/server/worker.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

# OAuth tokens storage
# Run: wrangler kv:namespace create CANVA_TOKENS
# Then replace YOUR_KV_NAMESPACE_ID below with the ID from that command
[[kv_namespaces]]
binding = "CANVA_TOKENS"
id = "YOUR_KV_NAMESPACE_ID"

[vars]
# Replace with your own Cloudflare Worker URL after deployment
BASE_URL = "https://your-worker.your-subdomain.workers.dev"
CANVA_REDIRECT_URI = "https://your-worker.your-subdomain.workers.dev/auth/callback"

